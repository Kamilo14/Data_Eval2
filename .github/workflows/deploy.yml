name: Publicar imagen docker
env:
#Compatibilidad con Node 24 para acciones de JavaScript
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - deploy
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repo
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/data-ev2:latest

      # --- DESPLIEGUE AUTOMÁTICO EN EC2 ---
      # Este paso se conecta por SSH a tu instancia EC2 y actualiza el contenedor de base de datos automáticamente.
      # Requiere que configures los secretos EC2_HOST (IP o DNS), EC2_SSH_KEY (llave privada PEM), DOCKER_USERNAME y DOCKER_TOKEN en GitHub.
      - name: Desplegar en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3  # Acción para ejecutar comandos SSH desde GitHub Actions
        with:
          host: ${{ secrets.EC2_HOST }}         # IP pública o DNS de tu EC2
          username: ec2-user                    # Usuario por defecto en Amazon Linux
          key: ${{ secrets.EC2_SSH_KEY }}       # Llave privada SSH (agrega como secreto en GitHub)
          port: 22                              # Puerto SSH por defecto
          script: |
            # Inicia sesión en Docker Hub en la EC2
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_TOKEN }}
            # Descarga la última imagen de la base de datos
            docker pull ${{ secrets.DOCKER_USERNAME }}/data-ev2:latest
            # Detiene el contenedor actual (si existe)
            docker stop mysql-db || true
            # Elimina el contenedor actual (si existe)
            docker rm mysql-db || true
            # Inicia el nuevo contenedor con la imagen actualizada
            docker run -d --name mysql-db --network app-network --env-file /home/ec2-user/.env.mysql -p 3306:3306 ${{ secrets.DOCKER_USERNAME }}/data-ev2:latest
      # --- FIN DESPLIEGUE AUTOMÁTICO ---